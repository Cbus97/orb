<!-- Paste this entire block into Simvoly Custom Body Markup -->
<!-- Remove any previous orb iframe code first -->
<iframe
  id="voiceai-orb-iframe"
  src="https://cbus97.github.io/orb/orb-frame.html"
  allow="microphone"
  style="position:fixed;bottom:20px;right:20px;width:340px;height:420px;border:none;background:transparent;z-index:999999;"
  frameborder="0"
  scrolling="no">
</iframe>
<script>
(function(){
  /* Prevent duplicate */
  if(window._orbLoaded) return;
  window._orbLoaded=true;

  var iframe=document.getElementById('voiceai-orb-iframe');
  if(!iframe) return;

  var dragging=false;
  var startClientX=0, startClientY=0;
  var startLeft=0, startTop=0;

  /* Convert initial fixed bottom/right to left/top */
  setTimeout(function(){
    var r=iframe.getBoundingClientRect();
    iframe.style.right='';
    iframe.style.bottom='';
    iframe.style.left=r.left+'px';
    iframe.style.top=r.top+'px';
  },100);

  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='orb-dragstart') return;
    dragging=true;
    /* e.data.x/y are clientX/Y from inside the iframe —
       add iframe's own position to get page coordinates */
    var r=iframe.getBoundingClientRect();
    startClientX=r.left+e.data.x;
    startClientY=r.top+e.data.y;
    startLeft=parseInt(iframe.style.left)||r.left;
    startTop=parseInt(iframe.style.top)||r.top;
    document.body.style.userSelect='none';
  });

  document.addEventListener('mousemove',function(e){
    if(!dragging) return;
    var dx=e.clientX-startClientX;
    var dy=e.clientY-startClientY;
    var newLeft=startLeft+dx;
    var newTop=startTop+dy;
    newLeft=Math.max(0,Math.min(window.innerWidth-340,newLeft));
    newTop=Math.max(0,Math.min(window.innerHeight-100,newTop));
    iframe.style.left=newLeft+'px';
    iframe.style.top=newTop+'px';
  });

  document.addEventListener('touchmove',function(e){
    if(!dragging) return;
    var dx=e.touches[0].clientX-startClientX;
    var dy=e.touches[0].clientY-startClientY;
    var newLeft=startLeft+dx;
    var newTop=startTop+dy;
    newLeft=Math.max(0,Math.min(window.innerWidth-340,newLeft));
    newTop=Math.max(0,Math.min(window.innerHeight-100,newTop));
    iframe.style.left=newLeft+'px';
    iframe.style.top=newTop+'px';
  },{passive:true});

  document.addEventListener('mouseup',function(){
    dragging=false;
    document.body.style.userSelect='';
  });
  document.addEventListener('touchend',function(){
    dragging=false;
  });
})();
</script>
